name: Keepalive

# Pings the live demo's health endpoint on a schedule so Render's free-tier
# instance doesn't idle to sleep, avoiding a 30-60s cold start on the next
# real request. This is a mitigation, not a fix: the free plan still caps
# monthly instance hours and offers no uptime SLA. For a real production
# deployment, use a paid plan instead of relying on this workflow.

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: curl -fsS --max-time 70 https://agentic-research-assistant-xzno.onrender.com/health
